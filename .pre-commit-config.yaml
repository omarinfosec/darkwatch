# pre-commit hooks for DarkWatch
# Install:  pip install pre-commit && pre-commit install
# Run on demand:  pre-commit run --all-files

repos:
  # ─── Hygiene ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=512']  # > 512 KB blocked; raise per-file with --enforce-all override
      - id: check-case-conflict
      - id: detect-private-key
      - id: forbid-new-submodules

  # ─── Secret scanning ─────────────────────────────────────────────────────
  # NOTE: The gitleaks hook was removed when .gitleaks.toml was untracked
  # (the per-repo config doesn't ship publicly). detect-secrets below stays
  # — it uses its own baseline at .secrets.baseline. Operators who want
  # full gitleaks coverage should keep a local .gitleaks.toml on disk
  # (gitignored) and run `gitleaks detect --config=.gitleaks.toml` manually
  # before each push.

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '^(LICENSE|darkwatch/static/.*)$'

  # ─── Project-specific guardrails ─────────────────────────────────────────
  - repo: local
    hooks:
      # Block any file under operational-data paths from ever being staged
      - id: forbid-operational-data
        name: forbid operational data paths
        entry: bash -c 'for f in "$@"; do case "$f" in data/*|loot/*|darkwatch-data/*|investigations/*|yara-private/*|*/wg_confs/*.conf|*.session|*.db|*.db-shm|*.db-wal) echo "BLOCKED: $f is operational data and must not be committed"; exit 1;; esac; done'
        language: system
        pass_filenames: true

      # Catch real WG configs that slipped past .gitignore
      - id: forbid-real-wg-configs
        name: refuse real WireGuard configs
        entry: bash -c 'for f in "$@"; do if [[ "$f" == *.conf ]] && grep -qE "^[[:space:]]*PrivateKey[[:space:]]*=[[:space:]]*[A-Za-z0-9+/]{43}=" "$f" 2>/dev/null; then echo "BLOCKED: $f contains a real WireGuard PrivateKey"; exit 1; fi; done'
        language: system
        pass_filenames: true

      # YARA rule files in the repo must be generic (no specific operator targets)
      - id: yara-generic-only
        name: YARA rules must be generic
        files: '^darkwatch/yara/.*\.yar$'
        entry: bash -c 'echo "Reminder: YARA rules in the public repo must be generic. Operator-specific rules belong in /var/lib/darkwebapp/yara-private/"'
        language: system
        pass_filenames: false

  # ─── Python ──────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ─── Dockerfile ──────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.0-beta
    hooks:
      - id: hadolint-docker
        args: ['--config', '.hadolint.yaml']
